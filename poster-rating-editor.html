<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영화 포스터 평점 제작 도구</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .controls {
            padding: 20px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            background: #fafafa;
        }
        .canvas-container {
            position: relative;
            background: #000;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-group textarea {
            height: 80px;
            resize: vertical;
        }
        .star-input {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 10px;
        }
        .star-input select {
            width: 80px;
        }
        .rating-preview {
            display: flex;
            gap: 2px;
        }
        .star {
            width: 16px;
            height: 16px;
            fill: #ffd700;
        }
        .star.empty {
            fill: #ddd;
        }
        .star.half {
            fill: url(#half-star-preview);
        }
        .poster-canvas {
            position: relative;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .rating-overlay {
            position: absolute;
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            backdrop-filter: blur(10px);
        }
        .rating-category {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .rating-category:last-child {
            margin-bottom: 0;
        }
        .category-name {
            font-weight: 500;
            opacity: 0.9;
        }
        .category-stars {
            display: flex;
            gap: 1px;
        }
        .overlay-star {
            width: 12px;
            height: 12px;
            fill: #ffd700;
        }
        .overlay-star.empty {
            fill: rgba(255, 255, 255, 0.3);
        }
        .overlay-star.half {
            fill: url(#half-star);
        }
        .download-btn {
            background: #007bff;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            margin-top: 20px;
            width: 100%;
        }
        .download-btn:hover {
            background: #0056b3;
        }
        .upload-area {
            border: 2px dashed #007bff;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            background: #f0f4ff;
        }
        .upload-area.dragover {
            background: #e3f2fd;
            border-color: #0056b3;
        }
    </style>
</head>

        const MoviePosterEditor = () => {
            const [posterImage, setPosterImage] = useState(defaultPosterImage);
            const [ratings, setRatings] = useState({
                "서사와 각본": 3.0,
                "캐릭터와 연기": 3.0,
                "시청각 미학": 4.0,
                "연출과 완성도": 3.0,
                "의미와 여운": 3.0
            });
            const [overlayPosition, setOverlayPosition] = useState({ x: 20, y: 350 });
            const [overlayStyle, setOverlayStyle] = useState('dark');
            const [overlayOpacity, setOverlayOpacity] = useState(0.85);
            const canvasRef = useRef(null);
            const displayedImgRef = useRef(null);
            const overlayRef = useRef(null);

            const clampPosition = (x, y) => {
                const imgEl = displayedImgRef.current;
                const overlayEl = overlayRef.current;
                if (!imgEl || !overlayEl) return { x, y };
                const maxX = imgEl.offsetWidth  - overlayEl.offsetWidth;
                const maxY = imgEl.offsetHeight - overlayEl.offsetHeight;
                return {
                    x: Math.max(0, Math.min(maxX, x)),
                    y: Math.max(0, Math.min(maxY, y))
                };
            };

            const handleFileUpload = (file) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    setPosterImage(e.target.result);
                };
                reader.readAsDataURL(file);
            };

            const handleDrop = (e) => {
                e.preventDefault();
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFileUpload(files[0]);
                }
            };

            const handleDragOver = (e) => {
                e.preventDefault();
            };

            const updateRating = (category, value) => {
                setRatings(prev => ({
                    ...prev,
                    [category]: parseFloat(value)
                }));
            };

            const generateStars = (rating) => {
                return (
                    <>
                        <svg width="0" height="0">
                            <defs>
                                <linearGradient id="half-star">
                                    <stop offset="50%" stopColor="#ffd700" />
                                    <stop offset="50%" stopColor="rgba(255, 255, 255, 0.3)" />
                                </linearGradient>
                                <linearGradient id="half-star-preview">
                                    <stop offset="50%" stopColor="#ffd700" />
                                    <stop offset="50%" stopColor="#ddd" />
                                </linearGradient>
                            </defs>
                        </svg>
                        {Array.from({ length: 5 }, (_, i) => {
                            const starValue = i + 1;
                            let starClass = 'star';
                            
                            if (rating >= starValue) {
                                starClass += ''; // 완전한 별
                            } else if (rating >= starValue - 0.5) {
                                starClass += ' half'; // 반별
                            } else {
                                starClass += ' empty'; // 빈별
                            }
                            
                            return (
                                <svg key={i} className={starClass} viewBox="0 0 24 24">
                                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                                </svg>
                            );
                        })}
                    </>
                );
            };

            const downloadPoster = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();

                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    // 미리보기 이미지 크기 → 원본 비율
                    const displayedImg = displayedImgRef.current;
                    const scaleX = img.width / displayedImg.offsetWidth;
                    const scaleY = img.height / displayedImg.offsetHeight;

                    const scaledX = overlayPosition.x * scaleX;
                    const scaledY = overlayPosition.y * scaleY;

                    const fontSize  = Math.round(13 * scaleY);
                    const lineH     = Math.round(22 * scaleY);
                    const padX      = Math.round(15 * scaleX);
                    const padY      = Math.round(12 * scaleY);
                    const starGap   = Math.round(2  * scaleX);

                    ctx.font = `500 ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;

                    // 카테고리 이름 최대 너비 측정
                    const entries = Object.entries(ratings);
                    let maxNameW = 0;
                    entries.forEach(([cat]) => {
                        const w = ctx.measureText(cat).width;
                        if (w > maxNameW) maxNameW = w;
                    });

                    // 별 하나의 너비 = fontSize (모노 근사)
                    const starW    = fontSize;
                    const starsW   = starW * 5 + starGap * 4;
                    const gapNameStar = Math.round(12 * scaleX);
                    const boxW     = padX * 2 + maxNameW + gapNameStar + starsW;
                    const boxH     = padY * 2 + entries.length * lineH - Math.round(4 * scaleY);

                    // 배경 (둥근 사각형)
                    const r = Math.round(8 * Math.min(scaleX, scaleY));
                    ctx.fillStyle = `rgba(0,0,0,${overlayOpacity})`;
                    ctx.beginPath();
                    ctx.moveTo(scaledX + r, scaledY);
                    ctx.arcTo(scaledX + boxW, scaledY,          scaledX + boxW, scaledY + boxH, r);
                    ctx.arcTo(scaledX + boxW, scaledY + boxH,   scaledX,        scaledY + boxH, r);
                    ctx.arcTo(scaledX,        scaledY + boxH,   scaledX,        scaledY,        r);
                    ctx.arcTo(scaledX,        scaledY,          scaledX + boxW, scaledY,        r);
                    ctx.closePath();
                    ctx.fill();

                    // 각 행: 카테고리명 + 별
                    entries.forEach(([category, rating], idx) => {
                        const rowY = scaledY + padY + fontSize + idx * lineH;

                        // 카테고리명 (흰색)
                        ctx.fillStyle = 'rgba(255,255,255,0.9)';
                        ctx.font = `500 ${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
                        ctx.fillText(category, scaledX + padX, rowY);

                        // 별 그리기
                        const fullStars  = Math.floor(rating);
                        const hasHalf    = (rating % 1) !== 0;
                        const emptyStars = 5 - Math.ceil(rating);
                        let sx = scaledX + padX + maxNameW + gapNameStar;

                        // 꽉 찬 별 — 노란색
                        ctx.fillStyle = '#ffd700';
                        for (let i = 0; i < fullStars; i++) {
                            ctx.fillText('★', sx, rowY);
                            sx += starW + starGap;
                        }
                        // 반 별 — 노란색
                        if (hasHalf) {
                            ctx.fillStyle = '#ffd700';
                            ctx.fillText('★', sx, rowY);
                            sx += starW + starGap;
                        }
                        // 빈 별 — 반투명 흰색
                        ctx.fillStyle = 'rgba(255,255,255,0.35)';
                        for (let i = 0; i < emptyStars; i++) {
                            ctx.fillText('★', sx, rowY);
                            sx += starW + starGap;
                        }
                    });

                    const link = document.createElement('a');
                    link.download = '영화포스터_평점.png';
                    link.href = canvas.toDataURL();
                    link.click();
                };

                img.src = posterImage;
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>🎬 영화 포스터 평점 제작 도구</h1>
                        <p>포스터 이미지를 업로드하고 평점을 설정하여 나만의 리뷰 포스터를 만들어보세요</p>
                    </div>

                    <div className="main-grid">
                        <div className="controls">
                            <div className="form-group">
                                <label>포스터 이미지 업로드</label>
                                <div 
                                    className="upload-area"
                                    onDrop={handleDrop}
                                    onDragOver={handleDragOver}
                                    onClick={() => document.getElementById('fileInput').click()}
                                >
                                    <p>클릭하거나 이미지를 드래그하여 업로드</p>
                                    <small>JPG, PNG 파일 지원</small>
                                </div>
                                <input
                                    id="fileInput"
                                    type="file"
                                    accept="image/*"
                                    style={{ display: 'none' }}
                                    onChange={(e) => e.target.files[0] && handleFileUpload(e.target.files[0])}
                                />
                            </div>

                            <div className="form-group">
                                <label>평점 설정</label>
                                {Object.entries(ratings).map(([category, rating]) => (
                                    <div key={category} className="star-input">
                                        <span style={{ minWidth: '130px', fontSize: '13px' }}>{category}</span>
                                        <select
                                            value={rating}
                                            onChange={(e) => updateRating(category, e.target.value)}
                                            style={{ 
                                                flex: 1, 
                                                padding: '6px 8px',
                                                border: '1px solid #ddd',
                                                borderRadius: '4px',
                                                fontSize: '14px',
                                                background: 'white'
                                            }}
                                        >
                                            <option value={0.5}>0.5점</option>
                                            <option value={1.0}>1.0점</option>
                                            <option value={1.5}>1.5점</option>
                                            <option value={2.0}>2.0점</option>
                                            <option value={2.5}>2.5점</option>
                                            <option value={3.0}>3.0점</option>
                                            <option value={3.5}>3.5점</option>
                                            <option value={4.0}>4.0점</option>
                                            <option value={4.5}>4.5점</option>
                                            <option value={5.0}>5.0점</option>
                                        </select>
                                        <div className="rating-preview" style={{ minWidth: '100px', justifyContent: 'flex-end' }}>
                                            {generateStars(rating)}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="form-group">
                                <label>오버레이 위치</label>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                                    <div>
                                        <label style={{ fontSize: '12px' }}>X 좌표</label>
                                        <input
                                            type="range"
                                            min="10"
                                            max="400"
                                            value={overlayPosition.x}
                                            onChange={(e) => setOverlayPosition(prev => clampPosition(parseInt(e.target.value), prev.y))}
                                        />
                                    </div>
                                    <div>
                                        <label style={{ fontSize: '12px' }}>Y 좌표</label>
                                        <input
                                            type="range"
                                            min="10"
                                            max="500"
                                            value={overlayPosition.y}
                                            onChange={(e) => setOverlayPosition(prev => clampPosition(prev.x, parseInt(e.target.value)))}
                                        />
                                    </div>
                                </div>
                            </div>

                            <div className="form-group">
                                <label>투명도 조절</label>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                    <span style={{ fontSize: '12px', minWidth: '30px' }}>투명</span>
                                    <input
                                        type="range"
                                        min="0.1"
                                        max="1.0"
                                        step="0.1"
                                        value={overlayOpacity}
                                        onChange={(e) => setOverlayOpacity(parseFloat(e.target.value))}
                                        style={{ flex: 1 }}
                                    />
                                    <span style={{ fontSize: '12px', minWidth: '30px' }}>불투명</span>
                                    <span style={{ fontSize: '12px', minWidth: '40px', textAlign: 'center', fontWeight: '500' }}>
                                        {Math.round(overlayOpacity * 100)}%
                                    </span>
                                </div>
                            </div>

                            <button className="download-btn" onClick={downloadPoster}>
                                💾 평점 포스터 다운로드
                            </button>
                        </div>

                        <div className="canvas-container">
                            <div style={{ position: 'relative', maxWidth: '100%' }}>
                                <img
                                    ref={displayedImgRef}
                                    src={posterImage}
                                    alt="영화 포스터"
                                    className="poster-canvas"
                                    style={{ maxHeight: '600px', width: 'auto' }}
                                />
                                <div
                                    ref={overlayRef}
                                    className="rating-overlay"
                                    style={{
                                        left: `${overlayPosition.x}px`,
                                        top: `${overlayPosition.y}px`,
                                        cursor: 'move',
                                        background: `rgba(0, 0, 0, ${overlayOpacity})`
                                    }}
                                    onMouseDown={(e) => {
                                        const startX = e.clientX - overlayPosition.x;
                                        const startY = e.clientY - overlayPosition.y;
                                        
                                        const handleMouseMove = (e) => {
                                            setOverlayPosition(
                                                clampPosition(e.clientX - startX, e.clientY - startY)
                                            );
                                        };
                                        
                                        const handleMouseUp = () => {
                                            document.removeEventListener('mousemove', handleMouseMove);
                                            document.removeEventListener('mouseup', handleMouseUp);
                                        };
                                        
                                        document.addEventListener('mousemove', handleMouseMove);
                                        document.addEventListener('mouseup', handleMouseUp);
                                    }}
                                >
                                    {Object.entries(ratings).map(([category, rating]) => (
                                        <div key={category} className="rating-category">
                                            <span className="category-name">{category}</span>
                                            <div className="category-stars">
                                                {Array.from({ length: 5 }, (_, i) => {
                                                    const starValue = i + 1;
                                                    let starClass = 'overlay-star';
                                                    
                                                    if (rating >= starValue) {
                                                        starClass += ''; // 완전한 별
                                                    } else if (rating >= starValue - 0.5) {
                                                        starClass += ' half'; // 반별
                                                    } else {
                                                        starClass += ' empty'; // 빈별
                                                    }
                                                    
                                                    return (
                                                        <svg key={i} className={starClass} viewBox="0 0 24 24">
                                                            <defs>
                                                                <linearGradient id="half-star">
                                                                    <stop offset="50%" stopColor="#ffd700" />
                                                                    <stop offset="50%" stopColor="rgba(255, 255, 255, 0.3)" />
                                                                </linearGradient>
                                                            </defs>
                                                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                                                        </svg>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<MoviePosterEditor />, document.getElementById('root'));
    </script>
</body>
</html>
